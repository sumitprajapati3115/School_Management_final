<!DOCTYPE html>
<html>
<head>
<title>Edit Admission</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY (Hero Background) */
body{
    font-family:'Segoe UI', sans-serif;

    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("/static/images/Hero (1).png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    overflow-x:hidden;
}

/* CARD (Glass Effect) */
.card{
    width:95%;
    max-width:500px;
    padding:30px;
    border-radius:20px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);

    color:white;
}

/* HEADER */
.form-header{
    text-align:center;
    margin-bottom:20px;
}

.form-header h2{
    font-weight:700;
    color:#38bdf8;
}

.form-header p{
    font-size:14px;
    color:#ddd;
}

/* INPUT */
.form-control{
    border-radius:10px;
    padding:10px;
    border:none;

    background:rgba(255,255,255,0.2);
    color:white;
}

.form-control::placeholder{
    color:#ddd;
}

.form-control:focus{
    box-shadow:0 0 10px rgba(56,189,248,0.5);
}

/* BUTTON */
.btn-custom{
    width:100%;
    padding:12px;
    border-radius:30px;
    border:none;

    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:white;
    font-weight:600;

    transition:0.3s;
}

.btn-custom:hover{
    transform:scale(1.05);
}

/* BACK BUTTON */
.back-btn{
    display:inline-block;
    margin-bottom:10px;
    color:#fff;
    text-decoration:none;
}

/* RESPONSIVE */
@media(max-width:768px){

    .card{
        padding:20px;
    }

    .form-header h2{
        font-size:22px;
    }

    .btn-custom{
        font-size:14px;
    }
}

</style>
</head>

<body>

<div class="card">

    <a href="/admin-dashboard/" class="back-btn">← Back</a>

    <div class="form-header">
        <h2>Edit Admission</h2>
        <p>Update student details</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            <input type="text" class="form-control" name="name" value="{{ a.name }}">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" class="form-control" name="email" value="{{ a.email }}">
        </div>

        <div class="mb-3">
            <label>Class / Course</label>
            <input type="text" class="form-control" name="course" value="{{ a.course }}">
        </div>

        <button type="submit" class="btn btn-custom">Update Admission</button>
    </form>

</div>

</body>
</html>
