<!DOCTYPE html>
<html>
<head>
    <title>Edit Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
     *{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

/* BODY (school hero style) */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI', sans-serif;

    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("/static/images/Hero (1).png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    overflow-x:hidden;   
}

/* CARD */
.card{
    width:95%;
    max-width:450px;
    padding:30px;
    border-radius:20px;

    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.3);
    box-shadow:0 10px 30px rgba(0,0,0,0.3);

    color:white;
}

/* HEADING */
h2{
    text-align:center;
    margin-bottom:20px;
    font-weight:600;
    color:#38bdf8;
}

/* LABEL */
label{
    font-size:14px;
    margin-bottom:5px;
}

/* INPUT */
.form-control{
    background:rgba(255,255,255,0.2);
    border:none;
    border-radius:10px;
    padding:10px;
    color:white;
}

.form-control::placeholder{
    color:#ddd;
}

.form-control:focus{
    box-shadow:0 0 10px rgba(56,189,248,0.5);
}

/* TEXTAREA */
textarea.form-control{
    resize:none;
}

/* BUTTON */
.btn-custom{
    width:100%;
    padding:12px;
    border-radius:30px;
    border:none;

    background:linear-gradient(135deg,#38bdf8,#0ea5e9);
    color:white;
    font-weight:600;

    transition:0.3s;
}

.btn-custom:hover{
    transform:scale(1.04);
}

/* RESPONSIVE */
@media(max-width:768px){
    .card{
        padding:20px;
    }

    h2{
        font-size:22px;
    }

    .btn-custom{
        font-size:14px;
    }
}

    </style>
</head>

<body>

<div class="card">
    <h2>Edit Event</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Title</label>
            <input type="text" class="form-control" name="title" value="{{ event.title }}" required>
        </div>

        <div class="mb-3">
            <label>Date</label>
            <input type="date" class="form-control" name="date" value="{{ event.date }}" required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea class="form-control" rows="3" name="description">{{ event.description }}</textarea>
        </div>

        <button type="submit" class="btn btn-custom">Update Event</button>
    </form>
</div>

</body>
</html>
